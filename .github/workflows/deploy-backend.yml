name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/702893411415/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@project-347898d6-1551-4abf-803.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          FINNHUB_API_KEY: d7bdvvhr01qgc9t72sc0d7bdvvhr01qgc9t72scg
          ALPHA_VANTAGE_API_KEY: PGLKVQ8VQQ8QRU61
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID || secrets.KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET || secrets.KEY_SECRET }}
        run: |
          ENV_VARS="FINNHUB_API_KEY=${FINNHUB_API_KEY},ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}"

          if [ -n "${RAZORPAY_KEY_ID}" ] && [ -n "${RAZORPAY_KEY_SECRET}" ]; then
            ENV_VARS="${ENV_VARS},RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID},RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}"
          else
            echo "Warning: Razorpay secrets are missing. Subscription checkout will be disabled."
          fi

          gcloud run deploy trade-journal-backend \
            --source backend/ \
            --region asia-south1 \
            --project project-347898d6-1551-4abf-803 \
            --allow-unauthenticated \
            --update-env-vars "${ENV_VARS}"
