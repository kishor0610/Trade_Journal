name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/702893411415/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deploy@project-347898d6-1551-4abf-803.iam.gserviceaccount.com'

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: trade-journal-backend
          source: backend/
          region: asia-south1
          project_id: project-347898d6-1551-4abf-803
          env_vars: |
            FINNHUB_API_KEY=d7bdvvhr01qgc9t72sc0d7bdvvhr01qgc9t72scg
            ALPHA_VANTAGE_API_KEY=PGLKVQ8VQQ8QRU61
